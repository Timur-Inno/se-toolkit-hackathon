services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-canteen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canteen}
      POSTGRES_DB: ${POSTGRES_DB:-canteen}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-canteen}:${POSTGRES_PASSWORD:-canteen}@db:5432/${POSTGRES_DB:-canteen}
      BOT_NOTIFY_URL: http://bot:9000/notify
    ports:
      - "8000:8000"
    depends_on:
      - db

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend

  admin:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./admin:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  pgdata:
