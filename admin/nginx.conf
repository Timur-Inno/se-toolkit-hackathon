server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /happiness { rewrite ^ /index.html?venue=happiness last; }
    location /neuro     { rewrite ^ /index.html?venue=neuro last; }
    location /injoy     { rewrite ^ /index.html?venue=injoy last; }
    location /canteen   { rewrite ^ /index.html?venue=canteen last; }
    location / { try_files $uri $uri/ /index.html; }
}
